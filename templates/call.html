<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio/Video Call</title>

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<nav class="sidebar">
    <h2>Mental Health Companion</h2>
    <ul class="sidebar-nav">
        <li><a href="/">Diagnosis</a></li>
        <li><a href="/appointment">Appointment</a></li>
        <li><a href="/relaxation">Relaxation Games</a></li>
        <li><a href="/call">Audio/Video Call</a></li>
        <li><a href="/books-page">Read Books</a></li>
        <li><a href="/community">Community</a></li>
        <li><a href="/settings">Settings</a></li>
        <li><a href="/feedback">Feedback</a></li>
    </ul>
</nav>

<div class="main-content">
    <header>
        <h1>Audio/Video Call</h1>
    </header>

    <div class="content">
        <section id="call">

            <h2>Select Doctor</h2>

            <div id="doctorSelection">
                <div class="doctor-item">
                    <p><strong>Dr. Alice</strong> - Psychiatrist</p>
                    <button class="start-call-btn" data-doctor="Dr. Alice">Start Call</button>
                </div>

                <div class="doctor-item">
                    <p><strong>Dr. Bob</strong> - Therapist</p>
                    <button class="start-call-btn" data-doctor="Dr. Bob">Start Call</button>
                </div>

                <div class="doctor-item">
                    <p><strong>Dr. Carol</strong> - Neurologist</p>
                    <button class="start-call-btn" data-doctor="Dr. Carol">Start Call</button>
                </div>
            </div>

            <div id="callControls">
                <button id="endCall" disabled>End Call</button>
            </div>

            <div id="videoContainer">
                <video id="localVideo" autoplay muted playsinline></video>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>

        </section>
    </div>
</div>

<!-- ✅ JS -->
<script src="{{ url_for('static', filename='call.js') }}"></script>

</body>
</html>
