<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<nav class="sidebar">
    <h2>Mental Health Companion</h2>
    <ul class="sidebar-nav">
        <li><a href="/">Diagnosis</a></li>
        <li><a href="/appointment">Appointment</a></li>
        <li><a href="/relaxation">Relaxation Games</a></li>
        <li><a href="/call">Audio/Video Call</a></li>
        <li><a href="/books-page">Read Books</a></li>
        <li><a href="/community">Community</a></li>
        <li><a href="/settings">Settings</a></li>
        <li><a href="/feedback">Feedback</a></li>
    </ul>
</nav>

<div class="main-content">
    <h1>Settings</h1>

    <!-- 🌙 DARK MODE -->
    <h3>Dark Mode</h3>
    <input type="checkbox" id="dark-mode">

    <!-- 🔔 EMAIL NOTIFICATIONS -->
    <h3>Email Notifications</h3>
    <input type="checkbox" id="email-notifications">

    <!-- 🔐 LOGOUT -->
    <h3>Account</h3>
    <button id="logout-btn">Logout</button>

</div>

<script>
    const toggle = document.getElementById("dark-mode");
    const emailToggle = document.getElementById("email-notifications");

    // ================= DARK MODE =================
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
        toggle.checked = true;
    }

    toggle.addEventListener("change", function () {
        if (this.checked) {
            document.body.classList.add("dark-mode");
            localStorage.setItem("darkMode", "enabled");
        } else {
            document.body.classList.remove("dark-mode");
            localStorage.setItem("darkMode", "disabled");
        }
    });

    // ================= EMAIL NOTIFICATIONS =================
    if (localStorage.getItem("emailNotifications") === "enabled") {
        emailToggle.checked = true;
    }

    emailToggle.addEventListener("change", function () {
        if (this.checked) {
            localStorage.setItem("emailNotifications", "enabled");
            alert("Email notifications enabled 🔔");
        } else {
            localStorage.setItem("emailNotifications", "disabled");
            alert("Email notifications disabled ❌");
        }
    });

    // ================= LOGOUT =================
    document.getElementById("logout-btn").addEventListener("click", function () {

        // Clear local storage (simulate logout)
        localStorage.clear();

        alert("Logged out successfully!");

        // Redirect to login page
        window.location.href = "/login-page";
    });

</script>

</body>
</html>
