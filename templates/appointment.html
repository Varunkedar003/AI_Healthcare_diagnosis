<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<nav class="sidebar">
    <h2>Mental Health Companion</h2>
    <ul class="sidebar-nav">
        <li><a href="/">Diagnosis</a></li>
        <li><a href="/appointment">Appointment</a></li>
    </ul>
</nav>

<div class="main-content">
    <h1>Book an Appointment</h1>

    <h2>Enter Symptoms</h2>

    <!-- ✅ FIXED FORM -->
    <form id="appointmentForm">
        <input type="text" id="symptoms" placeholder="Enter symptoms..." required>
        <button type="submit">Find Doctors</button>
    </form>

    <!-- RESULT -->
    <div id="result"></div>

    <!-- DOCTORS -->
    <div id="doctorSuggestions"></div>

    <!-- BOOKING -->
    <div id="appointmentDetails" style="display:none;">
        <h3>Booking with <span id="selectedDoctor"></span></h3>

        <input type="date" id="date">
        <input type="time" id="time">
        <button onclick="confirmBooking()">Confirm Booking</button>
    </div>
</div>

<script>
document.getElementById("appointmentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let symptoms = document.getElementById("symptoms").value;

    const res = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ symptoms })
    });

    const data = await res.json();

    // show prediction
    document.getElementById("result").innerHTML =
        `<h3>Disease: ${data.condition} (${data.confidence}%)</h3>`;

    // doctor mapping
    const doctorMap = {
        "Heart Disease": ["Cardiologist"],
        "Hypertension": ["Cardiologist"],
        "Diabetes": ["Endocrinologist"],
        "Migraine": ["Neurologist"],
        "Depression": ["Psychiatrist", "Therapist"],
        "Anxiety": ["Psychologist"],
        "Flu": ["General Physician"],
        "Common Cold": ["General Physician"],
        "Food Poisoning": ["Gastroenterologist"],
        "Arthritis": ["Orthopedic"],
        "Thyroid": ["Endocrinologist"],
        "Allergy": ["Dermatologist"]
    };

    let doctors = doctorMap[data.condition] || ["General Physician"];

    let html = "<h3>Select Doctor:</h3>";

    doctors.forEach(doc => {
        html += `<button onclick="selectDoctor('${doc}')">${doc}</button><br>`;
    });

    document.getElementById("doctorSuggestions").innerHTML = html;
});

function selectDoctor(name) {
    document.getElementById("appointmentDetails").style.display = "block";
    document.getElementById("selectedDoctor").innerText = name;
}

function confirmBooking() {
    alert("Appointment booked successfully!");
}
</script>

</body>
</html>
