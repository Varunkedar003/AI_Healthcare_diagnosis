<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mental Health Diagnosis</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<nav class="sidebar">
    <h2>Mental Health Companion</h2>
    <ul class="sidebar-nav">
        <li><a href="/">Diagnosis</a></li>
        <li><a href="/appointment">Appointment</a></li>
        <li><a href="/relaxation">Relaxation</a></li>
        <li><a href="/call">Call</a></li>
        <li><a href="/books-page">Books</a></li>
        <li><a href="/community">Community</a></li>
        <li><a href="/settings">Settings</a></li>
        <li><a href="/feedback">Feedback</a></li>
    </ul>
</nav>

<div class="main-content">
    <h1>Health Diagnosis</h1>

    <form id="symptomForm">
        <input type="text" id="symptoms" placeholder="Enter symptoms" required>
        <button type="submit">Analyze</button>
    </form>

    <h3 id="diagnosisResult"></h3>
    <p id="recommendation"></p>
</div>

<script>
document.getElementById("symptomForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const symptoms = document.getElementById("symptoms").value;

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ symptoms })
    });

    const data = await response.json();

    document.getElementById("diagnosisResult").innerText =
        `Diagnosis: ${data.condition} (${data.confidence}%)`;

    document.getElementById("recommendation").innerText =
        `Recommendation: ${data.recommendation}`;
});
</script>

</body>
</html>
