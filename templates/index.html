<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Companion - Diagnosis</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <h2>Mental Health Companion</h2>
        <ul class="sidebar-nav">
            <li><a href="/templates/">Diagnosis</a></li>
            <li><a href="appointment.html">Appointment</a></li>
            <li><a href="relaxation.html">Relaxation Games</a></li>
            <li><a href="call.html">Audio/Video Call</a></li>
            <li><a href="books.html">Read Books</a></li>
            <li><a href="community.html">Community Support</a></li>
            <li><a href="settings.html">Settings</a></li>
            <li><a href="feedback.html">Review and Feedback</a></li>
        </ul>
    </nav>
    <div class="main-content">
        <header>
            <h1>Mental Health Diagnosis</h1>
        </header>
        <div class="content">
            <section id="diagnosis" class="section">
                <h2>Symptom Analysis</h2>
                <form id="symptomForm">
                    <label for="symptoms">Enter your symptoms (comma separated):</label><br>
                    <input type="text" id="symptoms" name="symptoms" required><br>
                    <button type="submit">Submit</button>
                </form>
                <h3 id="diagnosisResult">Diagnosis:</h3>
                <p id="recommendation">Recommendation:</p>
            </section>
        </div>
    </div>

    <script>
        document.getElementById("symptomForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const symptoms = document.getElementById("symptoms").value;

            try {
                const response = await fetch("http://127.0.0.1:5000/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ symptoms: symptoms }),
                });

                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                const data = await response.json();

                document.getElementById("diagnosisResult").innerText = `Diagnosis: ${data.condition}`;
                document.getElementById("recommendation").innerText = `Recommendation: ${data.recommendation}`;
            } catch (error) {
                console.error("Error during fetch:", error);
                document.getElementById("diagnosisResult").innerText = "An error occurred. Please try again later.";
                document.getElementById("recommendation").innerText = "";
            }
        });
    </script>
</body>
</html>
