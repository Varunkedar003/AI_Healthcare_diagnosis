<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Companion - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background-color: #f1f1f1;
            padding: 20px;
            height: 100vh;
        }
        .sidebar h2 {
            color: #333;
        }
        .sidebar-nav {
            list-style-type: none;
            padding: 0;
        }
        .sidebar-nav li {
            margin-bottom: 10px;
        }
        .sidebar-nav a {
            text-decoration: none;
            color: #666;
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
        }
        .content {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
        } 
        input {
            margin-top: 5px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>Mental Health Companion</h2>
    </nav>
    <div class="main-content">
        <header>
            <h1>Login</h1>
        </header>
        <div class="content">
            <section id="login" class="section">
                <form id="loginForm">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <button type="submit">Login</button>
                </form>
                <p>Don't have an account? <a href="register.html">Register here</a></p>
                <p id="errorMessage" style="color: red;"></p> <!-- Error message -->
            </section>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();  // Prevent the form from submitting normally

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Send login data to backend using fetch API
            try {
                const response = await fetch("http://127.0.0.1:5000/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ email: email, password: password }),
                });

                if (!response.ok) {
                    throw new Error("Login failed");
                }

                // If login is successful, redirect to the home page (or another page)
                window.location.href = "/templates/";  // Change this to your desired URL
            } catch (error) {
                document.getElementById("errorMessage").innerText = "Invalid email or password. Please try again.";
            }
        });
    </script>
</body>
</html>
