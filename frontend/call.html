<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Companion - Audio/Video Call</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <h2>Mental Health Companion</h2>
        <ul class="sidebar-nav">
            <li><a href="/">Diagnosis</a></li>
            <li><a href="appointment.html">Appointment</a></li>
            <li><a href="relaxation.html">Relaxation Games</a></li>
            <li><a href="call.html">Audio/Video Call</a></li>
            <li><a href="books.html">Read Books</a></li>
        </ul>
    </nav>
    <div class="main-content">
        <header>
            <h1>Audio/Video Call</h1>
        </header>
        <div class="content">
            <section id="call" class="section">
                <h2>Suggested Doctors:</h2>
                <div id="doctorSelection">
                    <div class="doctor-item">
                        <p><strong>Dr. Alice</strong> - Psychiatrist</p>
                        <button class="start-call-btn" data-doctor="Dr. Alice">Start Call</button>
                    </div>
                    <div class="doctor-item">
                        <p><strong>Dr. Bob</strong> - Therapist</p>
                        <button class="start-call-btn" data-doctor="Dr. Bob">Start Call</button>
                    </div>
                    <div class="doctor-item">
                        <p><strong>Dr. Charlie</strong> - Psychologist</p>
                        <button class="start-call-btn" data-doctor="Dr. Charlie">Start Call</button>
                    </div>
                </div>
                <div id="callControls">
                    <button id="endCall" disabled>End Call</button>
                </div>
                <div id="videoContainer">
                    <video id="localVideo" autoplay muted></video>
                    <video id="remoteVideo" autoplay></video>
                </div>
            </section>
        </div>
    </div>

    <script src="call.js"></script>
</body>
</html>
