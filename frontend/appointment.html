<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Companion - Book Appointment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <h2>Mental Health Companion</h2>
        <ul class="sidebar-nav">
            <li><a href="/">Diagnosis</a></li>
            <li><a href="appointment.html">Appointment</a></li>
            <li><a href="relaxation.html">Relaxation Games</a></li>
            <li><a href="call.html">Audio/Video Call</a></li>
            <li><a href="books.html">Read Books</a></li>
        </ul>
    </nav>
    <div class="main-content">
        <header>
            <h1>Book an Appointment</h1>
        </header>
        <div class="content">
            <section id="appointment" class="section">
                <h2>Schedule Your Appointment</h2>
                <form id="appointmentForm">
                    <label for="symptoms">Enter your symptoms (comma separated):</label><br>
                    <input type="text" id="symptoms" name="symptoms" required><br>
                    <button type="submit">Find Doctors</button>
                </form>
                <div id="doctorSuggestions"></div>
                <div id="appointmentDetails" style="display: none;">
                    <h3>Book with <span id="selectedDoctor"></span></h3>
                    <form id="bookingForm">
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required><br>
                        <label for="time">Time:</label>
                        <input type="time" id="time" name="time" required><br>
                        <button type="submit">Book Appointment</button>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <script src="appointment.js"></script>
</body>
</html>
